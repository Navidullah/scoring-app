name: Keep backend awake

# Render's free tier sleeps after ~15 min idle (causing a slow cold start for
# the next visitor). Ping the health endpoint every ~10 minutes to keep it warm
# so live matches load instantly. Best-effort: GitHub may delay scheduled runs.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -sS -m 60 https://scoring-app-backend-xs6g.onrender.com/api/health || true
